version: "2.0"
engine: "intelliflow-rule-engine"

rules:

  - id: R001
    name: Enforce required columns
    category: schema
    priority: 10
    condition:
      type: missing_columns
      columns: [customer_id, order_date]
    action:
      type: fail_pipeline
      message: "Required columns missing"

  - id: R002
    name: Drop high-null columns
    category: quality
    priority: 20
    condition:
      type: null_ratio
      operator: ">"
      threshold: 0.9
    action:
      type: drop_column

  - id: R003
    name: Drop rows with critical nulls
    category: quality
    priority: 30
    condition:
      type: row_null
      columns: [customer_id, order_date]
    action:
      type: drop_row

  - id: R004
    name: Normalize dates
    category: formatting
    priority: 40
    condition:
      type: column_exists
      column: order_date
    action:
      type: normalize_date
      format: ISO8601

  - id: R005
    name: Create total_amount
    category: derived
    priority: 50
    condition:
      type: always
    action:
      type: derive_column
      column: total_amount
      expression: "quantity * unit_price"


  - id: R006
    priority: 1
    condition:
      type: column_null_ratio
      operator: ">"
      value: 0
    action: fill_mean

  - id: R007
    priority: 2
    condition:
      type: column_null_ratio
      operator: ">"
      value: 0
    action: fill_mode

    
  - id: R008
    priority: 1
    condition:
      type: column_null_ratio
      operator: ">"
      value: 0.1
    action: fill_mean

  - id: R009
    priority: 2
    condition:
      type: column_null_ratio
      operator: ">"
      value: 0.05
    action: fill_median

  - id: R010
    priority: 3
    condition:
      type: column_null_ratio
      operator: ">"
      value: 0
    action: fill_mode